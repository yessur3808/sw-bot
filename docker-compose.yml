version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starwars-bot
    env_file:
      - .env
    restart: unless-stopped
    command: python -u bot.py
    volumes:
      - ./starwars.db:/app/starwars.db
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: starwars-bot-postgres
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: starwars
      POSTGRES_USER: starwars
      POSTGRES_PASSWORD: starwars
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starwars -d starwars"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
